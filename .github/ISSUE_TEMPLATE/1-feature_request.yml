name: Feature Request
description: Suggest a new feature or enhancement for WeaponSkins
title: "[Feature]: "
labels: ["feature"]
assignees:
  - Abdelakil
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature for WeaponSkins! Please describe your idea in detail.

        ---

        💖 **I automatically detect GitHub Sponsors!**
        Sponsors are automatically labeled. Priority support is available from the **$15/month tier** and above. [Become a Sponsor](https://github.com/sponsors/Abdelakil)

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - Low - Nice to have
        - Medium - Would improve experience
        - High - Important for many users
        - Critical - Essential feature
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Describe the feature you'd like to see for WeaponSkins. Include any mockups, examples, or additional context that may help.
      placeholder: I would like to see a feature that allows...
    validations:
      required: true

  - type: dropdown
    id: feature_type
    attributes:
      label: Feature Type
      description: What type of feature is this?
      options:
        - New weapon skin support
        - New glove functionality
        - New knife features
        - New agent support
        - New music kit features
        - UI/Menu improvements
        - Performance optimization
        - Configuration options
        - Other
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate
          required: true
        - label: I have included all necessary information to understand and implement this feature
          required: true
        - label: I have considered the impact on server performance
          required: true
